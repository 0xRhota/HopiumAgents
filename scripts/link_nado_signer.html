<!DOCTYPE html>
<html>
<head>
    <title>Link Nado Signer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4aa; }
        .box {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
        }
        button {
            background: #00d4aa;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 5px 10px 0;
        }
        button:hover { background: #00b894; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .status { margin-top: 20px; padding: 10px; border-radius: 6px; }
        .success { background: #00d4aa33; border: 1px solid #00d4aa; }
        .error { background: #ff000033; border: 1px solid #ff6b6b; }
        input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background: #0f0f23;
            border: 1px solid #333;
            color: #eee;
            border-radius: 4px;
            margin: 5px 0;
        }
        label { display: block; margin-top: 10px; color: #888; }
    </style>
</head>
<body>
    <h1>Link Nado Signer</h1>
    <p>This will authorize a trading key for your Nado account.</p>

    <div class="box">
        <label>Your Wallet Address:</label>
        <input type="text" id="walletAddress" value="0x49d69C93A6Ec104898b743DC404E6E6a943b4124" />

        <label>Linked Signer Address (bot's key):</label>
        <input type="text" id="signerAddress" value="0xd086A7a803f23a4C714e01d67e0f733851431827" />

        <label>Subaccount Name:</label>
        <input type="text" id="subaccountName" value="default" />

        <label>Nonce (get from terminal: see below):</label>
        <input type="text" id="nonceInput" value="3" />

        <label>Network:</label>
        <select id="network" style="width:100%;padding:10px;background:#0f0f23;color:#eee;border:1px solid #333;border-radius:4px;">
            <option value="mainnet">Mainnet (Ink)</option>
            <option value="testnet">Testnet (Ink Sepolia)</option>
        </select>
    </div>

    <button id="connectBtn" onclick="connectWallet()">1. Connect Wallet</button>
    <button id="signBtn" onclick="signAndLink()" disabled>2. Sign & Link</button>

    <div id="status"></div>

    <script>
        // Nado chain configs
        const CONFIGS = {
            mainnet: {
                chainId: 57073,
                gateway: 'https://gateway.prod.nado.xyz/v1',
                endpoint: null // Will fetch from API
            },
            testnet: {
                chainId: 763373,
                gateway: 'https://gateway.test.nado.xyz/v1',
                endpoint: null
            }
        };

        let provider = null;
        let signer = null;

        function setStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.innerHTML = msg;
            el.className = 'status ' + (isError ? 'error' : 'success');
        }

        async function connectWallet() {
            try {
                if (!window.ethereum) {
                    setStatus('MetaMask not found!', true);
                    return;
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const address = accounts[0];

                document.getElementById('walletAddress').value = address;
                document.getElementById('signBtn').disabled = false;

                setStatus(`Connected: ${address}`);
            } catch (e) {
                setStatus('Connection failed: ' + e.message, true);
            }
        }

        function addressToBytes32(address, subaccountName) {
            // Remove 0x prefix
            const addrHex = address.toLowerCase().replace('0x', '');
            // Convert subaccount name to hex (pad to 12 bytes)
            const nameHex = Array.from(subaccountName)
                .map(c => c.charCodeAt(0).toString(16).padStart(2, '0'))
                .join('')
                .padEnd(24, '0'); // 12 bytes = 24 hex chars
            return '0x' + addrHex + nameHex;
        }

        function signerAddressToBytes32(address) {
            // Signer is just address padded with zeros
            const addrHex = address.toLowerCase().replace('0x', '');
            return '0x' + addrHex + '000000000000000000000000'; // Pad to 32 bytes
        }

        async function getEndpointAddress(gateway) {
            const resp = await fetch(`${gateway}/query?type=contracts`);
            const data = await resp.json();
            if (data.status === 'success') {
                return data.data.endpoint_addr;
            }
            throw new Error('Failed to get endpoint address');
        }

        async function signAndLink() {
            try {
                const network = document.getElementById('network').value;
                const config = CONFIGS[network];
                const walletAddress = document.getElementById('walletAddress').value;
                const signerAddress = document.getElementById('signerAddress').value;
                const subaccountName = document.getElementById('subaccountName').value;

                setStatus('Fetching contract address...');
                const endpointAddr = await getEndpointAddress(config.gateway);

                const sender = addressToBytes32(walletAddress, subaccountName);
                const signerBytes32 = signerAddressToBytes32(signerAddress);
                const nonce = parseInt(document.getElementById('nonceInput').value);

                const domain = {
                    name: 'Nado',
                    version: '0.0.1',
                    chainId: config.chainId,
                    verifyingContract: endpointAddr
                };

                const types = {
                    LinkSigner: [
                        { name: 'sender', type: 'bytes32' },
                        { name: 'signer', type: 'bytes32' },
                        { name: 'nonce', type: 'uint64' }
                    ]
                };

                const message = {
                    sender: sender,
                    signer: signerBytes32,
                    nonce: nonce
                };

                setStatus('Please sign the message in MetaMask...');

                // Request signature via EIP-712
                const signature = await window.ethereum.request({
                    method: 'eth_signTypedData_v4',
                    params: [walletAddress, JSON.stringify({
                        types: {
                            EIP712Domain: [
                                { name: 'name', type: 'string' },
                                { name: 'version', type: 'string' },
                                { name: 'chainId', type: 'uint256' },
                                { name: 'verifyingContract', type: 'address' }
                            ],
                            ...types
                        },
                        primaryType: 'LinkSigner',
                        domain: domain,
                        message: message
                    })]
                });

                // Show signature for manual submission (avoids CORS)
                setStatus(`
                    <h3>Signed! Copy this data:</h3>
                    <p><strong>Sender:</strong></p>
                    <input type="text" value="${sender}" onclick="this.select()" readonly />
                    <p><strong>Signer:</strong></p>
                    <input type="text" value="${signerBytes32}" onclick="this.select()" readonly />
                    <p><strong>Nonce:</strong></p>
                    <input type="text" value="${nonce}" onclick="this.select()" readonly />
                    <p><strong>Signature:</strong></p>
                    <input type="text" value="${signature}" onclick="this.select()" readonly />
                    <p style="margin-top:15px">Now run in terminal:</p>
                    <pre style="background:#0f0f23;padding:10px;border-radius:4px;overflow-x:auto;">python scripts/submit_link_signer.py "${sender}" "${signerBytes32}" "${nonce}" "${signature}"</pre>
                `)

            } catch (e) {
                setStatus('Error: ' + e.message, true);
                console.error(e);
            }
        }
    </script>
</body>
</html>
